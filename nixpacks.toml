[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.bcmath", "php84Packages.composer", "nodejs", "nodePackages.npm"]
aptPkgs = ["libatomic1"]

[phases.build]
cmds = ["php --version", "composer install --no-dev --optimize-autoloader --ignore-platform-reqs", "npm ci", "npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"